            {{#품사_한국어}}
            <span class="pos-badge">
                  「{{품사_한국어}}」
                  <span class="pos-jp">{{품사_일본어}}</span>
            </span>
            {{/품사_한국어}}

            {{#발음}}
            <span class="pronun-text">

      <div class="meanings-container">
